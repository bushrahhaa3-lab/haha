<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوري - Loving Homes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #060f0a, #0a1a0f);
            color: #d4f5e2;
        }
        
        /* Header */
        .header {
            background: rgba(0, 255, 135, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 135, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00ff87;
            text-shadow: 0 0 20px rgba(0, 255, 135, 0.5);
        }
        
        .back-btn {
            background: linear-gradient(135deg, #00ff87, #00a855);
            color: #060f0a;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.5);
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff, #00ff87);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h1 span {
            font-size: 1rem;
            display: block;
            color: #5a8a6e;
            -webkit-text-fill-color: #5a8a6e;
            margin-top: 0.5rem;
        }
        
        /* Grid Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .gallery-item {
            background: #0d1f14;
            border: 2px solid rgba(0, 255, 135, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s;
        }
        
        .gallery-item:hover {
            border-color: #00ff87;
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 255, 135, 0.3);
        }
        
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s;
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        
        .caption {
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            color: #00ff87;
            background: rgba(0, 0, 0, 0.3);
        }
        
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🐾 LOVING HOMES</div>
        <a href="index.html" class="back-btn">⬅️ الرجوع للرئيسية</a>
    </div>
    
    <div class="container">
        <h1>
            صوري الجميلة
            <span>مجموعة من أجمل اللحظات</span>
        </h1>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="./images/gallery-1.jpg" alt="الأجنحة الفاخرة">
                <div class="caption">🏰 الأجنحة الفاخرة</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-2.jpg" alt="جلسة الحلاقة">
                <div class="caption">✂️ جلسة الحلاقة</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-3.jpg" alt="وقت اللعب">
                <div class="caption">🎾 وقت اللعب</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-4.jpg" alt="حمام السبا">
                <div class="caption">🛀 حمام السبا</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-5.jpg" alt="جلسة السباحة">
                <div class="caption">🏊 جلسة السباحة</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-6.jpg" alt="الحديقة العلاجية">
                <div class="caption">🌿 الحديقة العلاجية</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-7.jpg" alt="وجبات فاخرة">
                <div class="caption">🍖 وجبات فاخرة</div>
            </div>
            
            <div class="gallery-item">
                <img src="./images/gallery-8.jpg" alt="وقت القيلولة">
                <div class="caption">😴 وقت القيلولة</div>
            </div>
        </div>
    </div>
</body>
</html>
